<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://*.clerk.accounts.dev https://*.clerk.dev https://*.clerk.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' http://127.0.0.1:8000 http://localhost:8000 https://investieren-production.up.railway.app https://*.clerk.accounts.dev https://*.clerk.dev https://*.clerk.com; frame-src 'self' https://*.clerk.accounts.dev https://*.clerk.dev https://*.clerk.com; child-src 'self' https://*.clerk.accounts.dev https://*.clerk.dev https://*.clerk.com; font-src 'self' https: data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <title>Completing sign-in...</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="flex min-h-screen items-center justify-center px-6">
      <div class="max-w-md rounded-[28px] border border-white/10 bg-slate-900/80 p-8 text-center shadow-2xl shadow-black/40 backdrop-blur">
        <div class="mx-auto mb-5 flex h-12 w-12 items-center justify-center rounded-2xl border border-white/10 bg-slate-950/70 text-lg font-semibold text-cyan-200">
          GQ
        </div>
        <h1 class="text-xl font-semibold">Signing you in…</h1>
        <p class="mt-3 text-sm text-slate-400">Finishing secure authentication.</p>
        <p id="callbackError" class="mt-4 text-sm text-rose-400" hidden>Login failed. Please try again.</p>
      </div>
    </main>
    <script src="auth-callback.js" defer></script>
  </body>
</html>
