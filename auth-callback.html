<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://*.clerk.accounts.dev https://*.clerk.dev https://*.clerk.com https://challenges.cloudflare.com https://*.hcaptcha.com https://hcaptcha.com; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:8000 http://localhost:8000 http://127.0.0.1:8003 http://localhost:8003 https://investieren-production.up.railway.app https://*.clerk.accounts.dev https://*.clerk.dev https://*.clerk.com https://challenges.cloudflare.com https://*.hcaptcha.com https://hcaptcha.com; frame-src 'self' https://*.clerk.accounts.dev https://*.clerk.dev https://*.clerk.com https://challenges.cloudflare.com https://*.hcaptcha.com https://hcaptcha.com; child-src 'self' https://*.clerk.accounts.dev https://*.clerk.dev https://*.clerk.com https://challenges.cloudflare.com https://*.hcaptcha.com https://hcaptcha.com; img-src 'self' data: https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <title>Completing login...</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f9f9f8;
        color: #171717;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid #e5e5e5;
        border-radius: 20px;
        background: #fff;
        padding: 24px;
        text-align: center;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      }
      .mono {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: #005c39;
        color: #fff;
        font-weight: 700;
        display: inline-grid;
        place-items: center;
        margin-bottom: 12px;
      }
      #callbackError {
        color: #b91c1c;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-live="polite">
      <div class="mono">GQ</div>
      <h1 style="margin: 0; font-size: 1.1rem;">Completing sign in...</h1>
      <p id="callbackStatus" style="margin: 10px 0 0; color: #525252;">Please wait a moment.</p>
      <div id="clerk-captcha" style="margin-top: 14px;"></div>
      <p id="callbackError" hidden>Login callback failed. Please try again.</p>
    </main>
    <script src="auth-callback.js" defer></script>
  </body>
</html>
